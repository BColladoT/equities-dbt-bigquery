name: 'equities'
version: '1.0.0'
config-version: 2
profile: 'equities'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Per-layer +schema puts each layer in its own BigQuery dataset (equities_staging,
# equities_intermediate, equities_marts). That makes "marts are what BI touches" physically
# enforceable rather than a naming convention: Looker Studio is granted equities_marts and
# nothing else. On the DuckDB dev target the same config produces the same schema names inside
# one local .duckdb file, so the layer boundary is visible in both targets.
models:
  equities:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  equities:
    +schema: raw
